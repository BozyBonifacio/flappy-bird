<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Flappy Bird</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    #game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #score-bar {
      display: flex;
      justify-content: space-between;
      width: 360px;
      max-width: 100vw;
      padding: 8px 6px;
      font-size: 10px;
      color: #aaa;
      letter-spacing: 0.5px;
    }

    #game-canvas {
      border-radius: 16px;
      display: block;
      cursor: pointer;
      touch-action: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      max-width: 100vw;
    }

    #hint {
      margin-top: 10px;
      font-size: 7px;
      color: #555;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div id="game-wrapper">
  <div id="score-bar">
    <span>SCORE: <span id="score-display">0</span></span>
    <span>BEST: <span id="best-display">0</span></span>
  </div>
  <canvas id="game-canvas" width="360" height="540"></canvas>
  <p id="hint">TAP · CLICK · SPACEBAR TO FLAP</p>
</div>

<script>
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score-display');
  const bestEl = document.getElementById('best-display');

  const W = canvas.width;
  const H = canvas.height;

  // ── Constants ──────────────────────────────────────────────
  const GRAVITY    = 0.45;
  const FLAP_VEL   = -8.5;
  const PIPE_W     = 54;
  const PIPE_GAP   = 148;
  const PIPE_SPEED = 2.6;
  const GROUND_H   = 64;
  const BIRD_R     = 17;
  const BIRD_X     = 80;

  // ── State ──────────────────────────────────────────────────
  let state, bird, pipes, score, best, frame, groundOff, clouds;

  function init() {
    state     = 'idle';
    bird      = { x: BIRD_X, y: H / 2 - 40, vy: 0, angle: 0, wingAngle: 0 };
    pipes     = [];
    score     = 0;
    frame     = 0;
    groundOff = 0;
    clouds    = [
      { x: 60,  y: 70,  r: 18 },
      { x: 180, y: 50,  r: 14 },
      { x: 300, y: 80,  r: 20 },
      { x: 100, y: 110, r: 12 },
      { x: 260, y: 105, r: 16 },
    ];
    scoreEl.textContent = score;
    try { best = parseInt(localStorage.getItem('fb_best') || '0'); } catch(e) { best = 0; }
    bestEl.textContent  = best;
  }

  // ── Input ──────────────────────────────────────────────────
  function flap() {
    if (state === 'dead') { init(); return; }
    if (state === 'idle') state = 'playing';
    bird.vy = FLAP_VEL;
  }

  canvas.addEventListener('click', flap);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
  });

  // ── Pipe spawning ──────────────────────────────────────────
  function spawnPipe() {
    const topH = 60 + Math.random() * (H - GROUND_H - PIPE_GAP - 100);
    pipes.push({ x: W + PIPE_W, topH, passed: false });
  }

  // ── Collision ──────────────────────────────────────────────
  function checkCollision() {
    const r = BIRD_R - 4;
    if (bird.y + r >= H - GROUND_H) return true;
    if (bird.y - r <= 0)            return true;
    for (const p of pipes) {
      if (bird.x + r > p.x + 6 && bird.x - r < p.x + PIPE_W - 6) {
        if (bird.y - r < p.topH || bird.y + r > p.topH + PIPE_GAP) return true;
      }
    }
    return false;
  }

  // ── Draw helpers ───────────────────────────────────────────
  function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y,     x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h,     x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y,         x + r, y);
    c.closePath();
  }

  // ── Draw: Sky ──────────────────────────────────────────────
  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
    grad.addColorStop(0, '#5BB8E8');
    grad.addColorStop(1, '#C8EAFF');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H - GROUND_H);
  }

  // ── Draw: Clouds ───────────────────────────────────────────
  function drawClouds() {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (const c of clouds) {
      ctx.beginPath();
      ctx.arc(c.x,              c.y,              c.r,       0, Math.PI * 2);
      ctx.arc(c.x + c.r * 0.9, c.y - c.r * 0.3,  c.r * 0.7, 0, Math.PI * 2);
      ctx.arc(c.x - c.r * 0.9, c.y - c.r * 0.2,  c.r * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Draw: Ground ───────────────────────────────────────────
  function drawGround() {
    ctx.fillStyle = '#6ABF4B';
    ctx.fillRect(0, H - GROUND_H, W, 10);

    ctx.fillStyle = '#d4a85e';
    ctx.fillRect(0, H - GROUND_H + 10, W, GROUND_H - 10);

    ctx.fillStyle = '#b8903e';
    ctx.fillRect(0, H - GROUND_H + 18, W, 5);

    ctx.fillStyle = '#c09040';
    for (let i = 0; i < 7; i++) {
      const ox = ((groundOff + i * 60) % (W + 60)) - 30;
      ctx.fillRect(ox, H - GROUND_H + 26, 38, 3);
    }
  }

  // ── Draw: Pipe ─────────────────────────────────────────────
  function drawPipe(p) {
    const capH    = 18;
    const capExtra = 6;
    const botY    = p.topH + PIPE_GAP;

    // bottom pipe body
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(p.x, botY + capH, PIPE_W, H - GROUND_H - botY - capH);
    ctx.fillStyle = '#388E3C';
    ctx.fillRect(p.x + PIPE_W - 8, botY + capH, 8, H - GROUND_H - botY - capH);

    // bottom cap
    ctx.fillStyle = '#2E7D32';
    roundRect(ctx, p.x - capExtra / 2, botY, PIPE_W + capExtra, capH, 4);
    ctx.fill();

    // top pipe body
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(p.x, 0, PIPE_W, p.topH - capH);
    ctx.fillStyle = '#388E3C';
    ctx.fillRect(p.x + PIPE_W - 8, 0, 8, p.topH - capH);

    // top cap
    ctx.fillStyle = '#2E7D32';
    roundRect(ctx, p.x - capExtra / 2, p.topH - capH, PIPE_W + capExtra, capH, 4);
    ctx.fill();
  }

  // ── Draw: Bird ─────────────────────────────────────────────
  function drawBird() {
    const { x, y, angle, wingAngle } = bird;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    // wing (behind body)
    ctx.fillStyle = '#FFA500';
    ctx.beginPath();
    const wy = Math.sin(wingAngle) * 8;
    ctx.ellipse(-6, wy, 10, 6, -0.4, 0, Math.PI * 2);
    ctx.fill();

    // body
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.ellipse(0, 0, BIRD_R, BIRD_R - 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#CC9900';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // belly highlight
    ctx.fillStyle = '#FFF3C0';
    ctx.beginPath();
    ctx.ellipse(4, 4, 9, 7, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // eye white
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(7, -5, 6, 0, Math.PI * 2);
    ctx.fill();

    // pupil
    ctx.fillStyle = '#222222';
    ctx.beginPath();
    ctx.arc(9, -5, 3, 0, Math.PI * 2);
    ctx.fill();

    // eye gleam
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(10, -6.5, 1.2, 0, Math.PI * 2);
    ctx.fill();

    // beak
    ctx.fillStyle = '#FF6B00';
    ctx.beginPath();
    ctx.moveTo(13, -2);
    ctx.lineTo(21, 0);
    ctx.lineTo(13,  4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  // ── Draw: HUD score ────────────────────────────────────────
  function drawScore() {
    if (state !== 'playing') return;
    ctx.textAlign   = 'center';
    ctx.fillStyle   = 'rgba(255,255,255,0.9)';
    ctx.font        = 'bold 26px "Press Start 2P"';
    ctx.shadowColor = 'rgba(0,0,0,0.25)';
    ctx.shadowBlur  = 4;
    ctx.fillText(score, W / 2, 60);
    ctx.shadowBlur  = 0;
    ctx.textAlign   = 'left';
  }

  // ── Draw: Overlays ─────────────────────────────────────────
  function drawOverlay() {
    if (state === 'idle') {
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = 'rgba(255,255,255,0.93)';
      roundRect(ctx, W/2 - 110, H/2 - 70, 220, 130, 14);
      ctx.fill();

      ctx.fillStyle   = '#2a2a2a';
      ctx.font        = '13px "Press Start 2P"';
      ctx.textAlign   = 'center';
      ctx.fillText('FLAPPY BIRD', W/2, H/2 - 35);

      ctx.font      = '7px "Press Start 2P"';
      ctx.fillStyle = '#555555';
      ctx.fillText('TAP / SPACE / CLICK', W/2, H/2);
      ctx.fillText('TO FLAP',             W/2, H/2 + 20);

      ctx.font = '28px sans-serif';
      ctx.fillText('🐦', W/2, H/2 + 52);

    } else if (state === 'dead') {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      roundRect(ctx, W/2 - 120, H/2 - 90, 240, 175, 14);
      ctx.fill();

      ctx.fillStyle = '#CC2222';
      ctx.font      = '13px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, H/2 - 55);

      ctx.fillStyle = '#333333';
      ctx.font      = '8px "Press Start 2P"';
      ctx.fillText('SCORE: ' + score, W/2, H/2 - 22);
      ctx.fillText('BEST:  ' + best,  W/2, H/2 + 2);

      if (score >= best && score > 0) {
        ctx.fillStyle = '#E67E00';
        ctx.fillText('NEW BEST!', W/2, H/2 + 26);
      }

      // Play Again button
      ctx.fillStyle = '#228822';
      roundRect(ctx, W/2 - 70, H/2 + 44, 140, 34, 8);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.font      = '8px "Press Start 2P"';
      ctx.fillText('PLAY AGAIN', W/2, H/2 + 65);
    }

    ctx.textAlign = 'left';
  }

  // ── Update ─────────────────────────────────────────────────
  function update() {
    frame++;

    if (state === 'playing') {
      // Physics
      bird.vy        += GRAVITY;
      bird.y         += bird.vy;
      bird.angle      = Math.max(-0.5, Math.min(Math.PI / 2.5, bird.vy * 0.055));
      bird.wingAngle += 0.35;

      // Scroll ground
      groundOff = (groundOff + PIPE_SPEED) % 60;

      // Scroll clouds
      for (const c of clouds) {
        c.x -= 0.4;
        if (c.x < -30) c.x = W + 30;
      }

      // Spawn pipes
      if (frame % 88 === 0) spawnPipe();

      // Move & score pipes
      for (const p of pipes) {
        p.x -= PIPE_SPEED;
        if (!p.passed && p.x + PIPE_W < bird.x) {
          p.passed = true;
          score++;
          scoreEl.textContent = score;
        }
      }
      pipes = pipes.filter(p => p.x > -PIPE_W - 10);

      // Collision check
      if (checkCollision()) {
        state = 'dead';
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          try { localStorage.setItem('fb_best', best); } catch(e) {}
        }
      }

    } else if (state === 'idle') {
      // Idle float animation
      bird.y          = H / 2 - 40 + Math.sin(frame * 0.04) * 8;
      bird.wingAngle += 0.2;
      bird.angle      = Math.sin(frame * 0.04) * 0.12;

      for (const c of clouds) {
        c.x -= 0.3;
        if (c.x < -30) c.x = W + 30;
      }
    }
  }

  // ── Render ─────────────────────────────────────────────────
  function render() {
    drawSky();
    drawClouds();
    for (const p of pipes) drawPipe(p);
    drawGround();
    drawBird();
    drawScore();
    drawOverlay();
  }

  // ── Game loop ──────────────────────────────────────────────
  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  init();
  loop();
</script>

</body>
</html>
